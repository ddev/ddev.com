name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_VERSION: 24

jobs:
  build:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run textlint || { printf "Run 'ddev textlint' locally to fix it.\n\n"; exit 1; }
      - name: Prettier
        run: npm run prettier || { printf "\nRun 'ddev prettier' locally to fix it.\n\n"; exit 1; }
      - name: Load Amplitude secrets
        # Skipped for forked-repo PRs: GitHub Actions never exposes secrets to those
        # anyway, but this avoids depending on that alone and skips a step that
        # would otherwise fail with no OP_SERVICE_ACCOUNT_TOKEN available.
        # Non-fatal (continue-on-error) since live Amplitude data is optional —
        # src/lib/amplitude.ts degrades gracefully when these aren't set.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: "${{ secrets.TESTS_SERVICE_ACCOUNT_TOKEN }}"
          AMPLITUDE_API_KEY: "op://test-secrets/AMPLITUDE_API_QUERY_KEY/credential"
          AMPLITUDE_SECRET_KEY: "op://test-secrets/AMPLITUDE_API_QUERY_SECRET_KEY/credential"
      - name: Install, build, and upload your site output
        uses: withastro/action@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
